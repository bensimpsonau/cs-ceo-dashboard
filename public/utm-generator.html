<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Link Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo p {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .field {
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }
  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-group.cols-4 {
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .btn {
    padding: 12px 16px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    background: #141414;
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:hover {
    background: #1a1a1a;
    border-color: #444;
    color: #fff;
  }
  .btn.active {
    background: #1a3a2a;
    border-color: #2d8a5e;
    color: #4ade80;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    background: #141414;
    color: #e5e5e5;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus {
    border-color: #2d8a5e;
  }
  input[type="text"]::placeholder {
    color: #555;
  }
  .divider {
    border-top: 1px solid #1a1a1a;
    margin: 28px 0;
  }
  .output-section {
    display: none;
  }
  .output-section.visible {
    display: block;
  }
  .output-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }
  .output-box {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    word-break: break-all;
    font-size: 13px;
    color: #4ade80;
    font-family: 'SF Mono', 'Fira Code', monospace;
    line-height: 1.5;
    margin-bottom: 12px;
    min-height: 48px;
  }
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .copy-btn, .open-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn {
    background: #2d8a5e;
    color: #fff;
  }
  .copy-btn:hover {
    background: #34a068;
  }
  .copy-btn.copied {
    background: #1a5c3a;
  }
  .open-btn {
    background: #1a1a3a;
    border: 1px solid #3a3aaa;
    color: #8a8aff;
  }
  .open-btn:hover {
    background: #2a2a5a;
  }
  .utm-breakdown {
    margin-top: 16px;
    padding: 12px 16px;
    background: #0f0f0f;
    border-radius: 8px;
    font-size: 12px;
    color: #666;
    line-height: 1.8;
  }
  .utm-breakdown span {
    color: #888;
  }
  .call-type-indicator {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .call-type-indicator.new {
    background: #1a3a2a;
    color: #4ade80;
  }
  .call-type-indicator.renewal {
    background: #3a2a1a;
    color: #f59e0b;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Collective Shift</h1>
    <p>Setter Link Generator</p>
  </div>

  <div class="field">
    <label>Your Name</label>
    <div class="btn-group cols-4" id="setterGroup">
      <button class="btn" data-value="zen">Zen</button>
      <button class="btn" data-value="james">James</button>
      <button class="btn" data-value="dereck">Dereck</button>
      <button class="btn" data-value="ricardo">Ricardo</button>
    </div>
  </div>

  <div class="field">
    <label>Call Type</label>
    <div class="btn-group" id="callTypeGroup">
      <button class="btn" data-value="new">New Customer</button>
      <button class="btn" data-value="renewal">Renewal Call</button>
    </div>
  </div>

  <div class="field">
    <label>Lead Source</label>
    <div class="btn-group" id="mediumGroup">
      <button class="btn" data-value="ig-dm">IG DMs</button>
      <button class="btn" data-value="vsl-application">VSL Applications</button>
      <button class="btn" data-value="masterclass">Masterclass</button>
      <button class="btn" data-value="wpb-lead">WPB Leads</button>
    </div>
  </div>

  <div class="field">
    <label>Campaign Name <span style="color:#555; text-transform:none; font-weight:400;">(optional - defaults to "setter-outreach")</span></label>
    <input type="text" id="campaignName" placeholder="e.g. masterclass-may-2026">
  </div>

  <div class="divider"></div>

  <div class="output-section" id="outputSection">
    <div id="callTypeIndicator"></div>
    <div class="output-label">Your Link</div>
    <div class="output-box" id="outputBox"></div>
    <div class="action-row">
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy Link</button>
      <button class="open-btn" id="openBtn" onclick="openLink()">Open Calendly</button>
    </div>
    <div class="utm-breakdown" id="utmBreakdown"></div>
  </div>
</div>

<script>
  const CALENDLY_URLS = {
    new: 'https://calendly.com/cs-consultation/platinum-membership-1-1-call-rr',
    renewal: 'https://calendly.com/cs-consultation/consultation-call'
  };

  let selectedSetter = '';
  let selectedMedium = '';
  let selectedCallType = '';

  function setupGroup(groupId, callback) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        callback(btn.dataset.value);
        generateLink();
      });
    });
  }

  setupGroup('setterGroup', val => selectedSetter = val);
  setupGroup('callTypeGroup', val => selectedCallType = val);
  setupGroup('mediumGroup', val => selectedMedium = val);

  document.getElementById('campaignName').addEventListener('input', generateLink);

  function generateLink() {
    const output = document.getElementById('outputSection');
    const box = document.getElementById('outputBox');
    const breakdown = document.getElementById('utmBreakdown');
    const indicator = document.getElementById('callTypeIndicator');

    if (!selectedSetter || !selectedMedium || !selectedCallType) {
      output.classList.remove('visible');
      return;
    }

    const baseUrl = CALENDLY_URLS[selectedCallType];
    const campaign = document.getElementById('campaignName').value.trim().toLowerCase().replace(/\s+/g, '-') || 'setter-outreach';

    const utmParams = new URLSearchParams({
      utm_source: selectedSetter,
      utm_medium: selectedMedium,
      utm_campaign: campaign,
      utm_content: selectedCallType === 'renewal' ? 'renewal' : 'booking'
    });

    const link = `${baseUrl}?${utmParams.toString()}`;

    // Show call type indicator
    if (selectedCallType === 'new') {
      indicator.innerHTML = '<span class="call-type-indicator new">New Customer Call</span>';
    } else {
      indicator.innerHTML = '<span class="call-type-indicator renewal">Renewal Call</span>';
    }

    box.textContent = link;

    const callLabel = selectedCallType === 'new' ? 'Platinum 1:1 (new customer)' : 'Consultation (renewal)';
    breakdown.innerHTML = `
      <span>setter:</span> ${selectedSetter}<br>
      <span>source:</span> ${selectedMedium}<br>
      <span>campaign:</span> ${campaign}<br>
      <span>call type:</span> ${callLabel}<br>
      <span>calendly form:</span> ${baseUrl.split('/').pop()}
    `;

    output.classList.add('visible');
    document.getElementById('copyBtn').textContent = 'Copy Link';
    document.getElementById('copyBtn').classList.remove('copied');
  }

  function copyLink() {
    const link = document.getElementById('outputBox').textContent;
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Link';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function openLink() {
    const link = document.getElementById('outputBox').textContent;
    if (link) window.open(link, '_blank');
  }
</script>
</body>
</html>
