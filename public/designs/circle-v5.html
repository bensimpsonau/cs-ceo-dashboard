<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collective Shift — Circle Diagram V5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a0a;
    width: 900px;
    height: 900px;
    overflow: hidden;
  }
</style>
</head>
<body>
<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" style="display:block;">
  <defs>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1800"/>
      <stop offset="100%" stop-color="#180e00"/>
    </radialGradient>
    <radialGradient id="innerTopGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1500"/>
      <stop offset="100%" stop-color="#130d00"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="900" fill="#0a0a0a"/>

  <!-- ══════════════════════════════════════════════
       OUTER RING  r=390 → r=320
       4 quadrant arcs (45° boundary = NE, SE, SW, NW)
       ══════════════════════════════════════════════ -->

  <!-- Segment boundaries at 45° angles: points on r=390 -->
  <!-- NE: 450+276,450-276 = 726,174  |  SE: 726,726  |  SW: 174,726  |  NW: 174,174 -->

  <!-- Top (Cohort Groups) — NW to NE (315°→45°) -->
  <path d="M450,450 L726,174 A390,390 0 0,0 174,174 Z" fill="#181818" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Right (International) — NE to SE (45°→135°) -->
  <path d="M450,450 L726,726 A390,390 0 0,0 726,174 Z" fill="#161616" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Bottom (Australia) — SE to SW (135°→225°) -->
  <path d="M450,450 L174,726 A390,390 0 0,0 726,726 Z" fill="#181818" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Left (Community) — SW to NW (225°→315°) -->
  <path d="M450,450 L174,174 A390,390 0 0,0 174,726 Z" fill="#161616" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Outer ring circles -->
  <circle cx="450" cy="450" r="390" fill="none" stroke="#282828" stroke-width="1.5"/>
  <circle cx="450" cy="450" r="320" fill="none" stroke="#282828" stroke-width="1.5"/>

  <!-- Outer ring dividers (45° lines) -->
  <line x1="450" y1="450" x2="726" y2="174" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="450" y1="450" x2="726" y2="726" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="450" y1="450" x2="174" y2="726" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="450" y1="450" x2="174" y2="174" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Outer ring labels — centroid of each 90° sector at r≈355 -->
  <!-- Top (Cohort) centroid at 0° (top) -->
  <text x="450" y="120" font-family="Inter" font-size="13" font-weight="700" fill="#F7931A" text-anchor="middle">👥 Cohort Groups</text>
  <text x="450" y="138" font-family="Inter" font-size="11" fill="#888" text-anchor="middle">A · B · C</text>

  <!-- Right (International) centroid at 90° (right) -->
  <text x="755" y="438" font-family="Inter" font-size="12" font-weight="700" fill="#F7931A" text-anchor="middle">🌍 International</text>
  <text x="755" y="456" font-family="Inter" font-size="10" fill="#888" text-anchor="middle">🇺🇸 US  🇳🇿 NZ</text>
  <text x="755" y="472" font-family="Inter" font-size="10" fill="#888" text-anchor="middle">🇦🇪 UAE  🏴 England</text>

  <!-- Bottom (Australia) centroid at 180° (bottom) -->
  <text x="450" y="775" font-family="Inter" font-size="13" font-weight="700" fill="#F7931A" text-anchor="middle">🇦🇺 Australia</text>
  <text x="450" y="793" font-family="Inter" font-size="11" fill="#888" text-anchor="middle">VIC · NSW · QLD · Perth</text>

  <!-- Left (Community) centroid at 270° (left) -->
  <text x="148" y="450" font-family="Inter" font-size="13" font-weight="700" fill="#F7931A" text-anchor="middle">🌐 Community</text>

  <!-- ══════════════════════════════════════════════
       MIDDLE RING  r=320 → r=200
       Channels — cardinal quadrants (N/E/S/W)
       ══════════════════════════════════════════════ -->

  <!-- Top (Research channels) -->
  <path d="M450,450 L450,130 A320,320 0 0,1 770,450 Z" fill="#131310" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Right (Investment channels) -->
  <path d="M450,450 L770,450 A320,320 0 0,1 450,770 Z" fill="#111316" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Bottom (Portfolio channels) -->
  <path d="M450,450 L450,770 A320,320 0 0,1 130,450 Z" fill="#111411" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Left (Education channels) -->
  <path d="M450,450 L130,450 A320,320 0 0,1 450,130 Z" fill="#111116" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Middle ring circles -->
  <circle cx="450" cy="450" r="320" fill="none" stroke="#282828" stroke-width="1.5"/>
  <circle cx="450" cy="450" r="200" fill="none" stroke="#282828" stroke-width="1.5"/>

  <!-- Middle ring cardinal dividers -->
  <line x1="450" y1="130" x2="450" y2="770" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="130" y1="450" x2="770" y2="450" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Middle ring channel labels -->
  <!-- Top-right quadrant: Research channels (centroid ~45°, r~260) -->
  <text x="560" y="248" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Market Pulse</text>
  <text x="600" y="270" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Weekly Outlook</text>
  <text x="628" y="296" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Altcoin Insights</text>
  <text x="643" y="325" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Real-Time Alerts</text>

  <!-- Right quadrant: Investment channels -->
  <text x="660" y="390" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Strategy Edge</text>
  <text x="676" y="450" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Investor Frameworks</text>
  <text x="660" y="510" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Deep Dive Reports</text>

  <!-- Bottom quadrant: Portfolio channels -->
  <text x="560" y="652" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">New Positions</text>
  <text x="520" y="676" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Monthly Rebalance</text>
  <text x="480" y="696" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Sell Decisions</text>

  <!-- Left quadrant: Education channels -->
  <text x="244" y="390" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Steps 1–4</text>
  <text x="228" y="450" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Steps 5–7</text>
  <text x="244" y="510" font-family="Inter" font-size="11" fill="#ddd" text-anchor="middle">Bonus Sessions</text>

  <!-- ══════════════════════════════════════════════
       INNER RING  r=200 → r=110
       4 section headers (cardinal)
       ══════════════════════════════════════════════ -->

  <!-- Cover middle ring center -->
  <circle cx="450" cy="450" r="200" fill="#0a0a0a"/>

  <!-- Top: Research & Insights -->
  <path d="M450,450 L450,250 A200,200 0 0,1 650,450 Z" fill="#1c1200" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Right: Investment Strategy -->
  <path d="M450,450 L650,450 A200,200 0 0,1 450,650 Z" fill="#121218" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Bottom: Portfolio Updates -->
  <path d="M450,450 L450,650 A200,200 0 0,1 250,450 Z" fill="#0f1810" stroke="#0a0a0a" stroke-width="3"/>
  <!-- Left: Education -->
  <path d="M450,450 L250,450 A200,200 0 0,1 450,250 Z" fill="#10101c" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Inner ring border -->
  <circle cx="450" cy="450" r="200" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="450" cy="450" r="110" fill="none" stroke="#F7931A" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Inner ring cardinal dividers -->
  <line x1="450" y1="250" x2="450" y2="650" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="250" y1="450" x2="650" y2="450" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Inner section labels — placed at ~r=160 from center in each quadrant midpoint (45°) -->
  <!-- Top-right (Research & Insights): 45° angle from top-right -->
  <!-- r=160, angle=45°: x=450+113=563, y=450-113=337. Block top at 320 -->
  <text x="563" y="320" font-family="Inter" font-size="16" text-anchor="middle">📊</text>
  <text x="563" y="340" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Research &amp;</text>
  <text x="563" y="354" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Insights</text>

  <!-- Bottom-right (Investment Strategy): 135° angle -->
  <!-- r=160, angle=135°: x=450+113=563, y=450+113=563. -->
  <text x="563" y="548" font-family="Inter" font-size="16" text-anchor="middle">📈</text>
  <text x="563" y="568" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Investment</text>
  <text x="563" y="582" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Strategy</text>

  <!-- Bottom-left (Portfolio Updates): 225° angle -->
  <!-- r=160, angle=225°: x=450-113=337, y=450+113=563. -->
  <text x="337" y="548" font-family="Inter" font-size="16" text-anchor="middle">💼</text>
  <text x="337" y="568" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Portfolio</text>
  <text x="337" y="582" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Updates</text>

  <!-- Top-left (Education): 315° angle -->
  <!-- r=160, angle=315°: x=450-113=337, y=450-113=337. -->
  <text x="337" y="322" font-family="Inter" font-size="16" text-anchor="middle">🎓</text>
  <text x="337" y="342" font-family="Inter" font-size="10" font-weight="700" fill="#F7931A" text-anchor="middle">Education</text>

  <!-- ══════════════════════════════════════════════
       CENTER CIRCLE  r=110
       ══════════════════════════════════════════════ -->
  <circle cx="450" cy="450" r="110" fill="url(#centerGrad)"/>
  <circle cx="450" cy="450" r="110" fill="none" stroke="#F7931A" stroke-width="2"/>

  <!-- Center text -->
  <text x="450" y="435" font-family="'Playfair Display', serif" font-size="18" font-weight="700" fill="#F7931A" text-anchor="middle">Collective</text>
  <text x="450" y="458" font-family="'Playfair Display', serif" font-size="18" font-weight="700" fill="#F7931A" text-anchor="middle">Shift</text>
  <text x="450" y="476" font-family="Inter" font-size="9" fill="#888" text-anchor="middle" letter-spacing="2.5">₿ PLATFORM</text>
</svg>
</body>
</html>
