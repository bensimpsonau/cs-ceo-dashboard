<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Nav - Investment Strategy Highlighted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    width: 1200px;
    min-height: 400px;
  }
  .nav-wrapper {
    background: #111111;
    border-bottom: 1px solid #222;
    position: relative;
  }
  .nav-container {
    width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    height: 60px;
    padding: 0 40px;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: #F7931A;
    margin-right: 60px;
    white-space: nowrap;
  }
  .nav-items {
    display: flex;
    align-items: center;
    gap: 0;
    list-style: none;
    height: 100%;
  }
  .nav-item {
    height: 100%;
    display: flex;
    align-items: center;
    position: relative;
  }
  .nav-link {
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 20px;
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .nav-link:hover { color: #fff; }
  .nav-item.active .nav-link {
    color: #F7931A;
    border-bottom: 2px solid #F7931A;
  }
  .nav-item.active .nav-link::after {
    content: ' ▾';
    font-size: 10px;
    margin-left: 4px;
  }
  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-top: 2px solid #F7931A;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(247,147,26,0.1);
    border-radius: 0 0 8px 8px;
    min-width: 260px;
    padding: 8px 0;
    z-index: 100;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 20px;
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .dropdown-item:hover {
    background: #222;
    color: #fff;
  }
  .dropdown-item.highlighted {
    background: #211a0e;
    color: #fff;
    border-left: 3px solid #F7931A;
  }
  .dropdown-item .icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .page-content {
    padding: 60px 40px;
    color: #555;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="nav-wrapper">
  <div class="nav-container">
    <div class="nav-logo">Collective Shift</div>
    <ul class="nav-items">
      <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
      <li class="nav-item active">
        <a href="#" class="nav-link">Research</a>
        <div class="dropdown">
          <a href="#" class="dropdown-item">
            <span class="icon">📊</span> Research &amp; Insights
          </a>
          <a href="#" class="dropdown-item highlighted">
            <span class="icon">📈</span> Investment Strategy
          </a>
          <a href="#" class="dropdown-item">
            <span class="icon">💼</span> Portfolio Updates
          </a>
        </div>
      </li>
      <li class="nav-item"><a href="#" class="nav-link">Education</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Tools</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Community</a></li>
    </ul>
  </div>
</div>
<div class="page-content">Page content area</div>
</body>
</html>
