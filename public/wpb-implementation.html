<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Protection Blueprint - Implementation Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1B1925;
  --orange: #FC5C03;
  --orange-hover: #e04f00;
  --white: #FFFFFF;
  --light-bg: #F8F8FA;
  --border: #E8E8EC;
  --text: #333340;
  --text-light: #6B6B7B;
  --text-muted: #A0A0B0;
  --green: #43A047;
  --green-bg: #E8F5E9;
  --blue: #1E88E5;
  --blue-bg: #E3F2FD;
  --red: #E53935;
  --red-bg: #FFEBEE;
  --amber: #FB8C00;
  --amber-bg: #FFF3E0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--light-bg);
  color: var(--text);
  line-height: 1.6;
}

/* Header */
.header {
  background: var(--dark);
  color: var(--white);
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.5;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.progress-bar-wrapper {
  width: 200px;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 4px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--orange);
  min-width: 36px;
  text-align: right;
}

/* Layout */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Overview cards */
.overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.overview-card {
  background: var(--white);
  border-radius: 12px;
  padding: 20px 24px;
  border: 1px solid var(--border);
}
.overview-card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.overview-card-value {
  font-size: 28px;
  font-weight: 800;
}
.overview-card-sub {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* Phase sections */
.phase {
  margin-bottom: 40px;
}
.phase-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  cursor: pointer;
  user-select: none;
}
.phase-number {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}
.phase-title {
  font-size: 16px;
  font-weight: 700;
}
.phase-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: auto;
}
.phase-toggle {
  font-size: 18px;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.phase-toggle.collapsed { transform: rotate(-90deg); }

.phase-body {
  background: var(--white);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.phase-body.collapsed { display: none; }

/* Checklist items */
.check-item {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: background 0.15s;
}
.check-item:last-child { border-bottom: none; }
.check-item:hover { background: var(--light-bg); }
.check-item.done { opacity: 0.55; }
.check-item.done .check-title { text-decoration: line-through; }

.check-box {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  margin-top: 1px;
}
.check-box:hover { border-color: var(--orange); }
.check-box.checked {
  background: var(--green);
  border-color: var(--green);
}
.check-box.checked::after {
  content: '✓';
  color: white;
  font-size: 13px;
  font-weight: 700;
}

.check-content { flex: 1; min-width: 0; }
.check-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}
.check-desc {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.5;
}
.check-expand-btn {
  font-size: 12px;
  color: var(--orange);
  cursor: pointer;
  font-weight: 600;
  margin-top: 6px;
  display: inline-block;
}
.check-expand-btn:hover { text-decoration: underline; }
.check-detail {
  display: none;
  margin-top: 12px;
  padding: 14px 16px;
  background: var(--light-bg);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--text);
}
.check-detail.visible { display: block; }
.check-detail h4 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--orange);
  margin: 12px 0 6px;
}
.check-detail h4:first-child { margin-top: 0; }
.check-detail pre {
  background: var(--dark);
  color: #E0E0E0;
  padding: 14px 16px;
  border-radius: 8px;
  overflow-x: auto;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  line-height: 1.5;
  margin: 8px 0;
  white-space: pre-wrap;
  word-break: break-all;
}
.check-detail code {
  background: rgba(252,92,3,0.1);
  color: var(--orange);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
}
.check-detail ul {
  margin: 6px 0;
  padding-left: 20px;
}
.check-detail li {
  margin-bottom: 4px;
}
.check-detail table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
}
.check-detail th, .check-detail td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.check-detail th {
  background: var(--dark);
  color: var(--white);
  font-weight: 600;
}

/* Copy buttons */
.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--dark);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 8px;
}
.copy-btn:hover { background: #2a2838; }
.copy-btn.copied { background: var(--green); }

/* Tag badges */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-left: 8px;
}
.tag-typeform { background: #E3F2FD; color: #1565C0; }
.tag-ghl { background: #FFF3E0; color: #E65100; }
.tag-customerio { background: #F3E5F5; color: #7B1FA2; }
.tag-code { background: #E8F5E9; color: #2E7D32; }
.tag-pdf { background: #FFEBEE; color: #C62828; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; flex-wrap: wrap; gap: 12px; }
  .header-right { width: 100%; }
  .progress-bar-wrapper { flex: 1; }
  .container { padding: 20px 16px 60px; }
  .overview { grid-template-columns: 1fr 1fr; }
  .check-item { padding: 14px 16px; }
  .check-detail pre { font-size: 11px; padding: 10px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-brand">COLLECTIVE SHIFT</div>
      <div class="header-title">Wealth Protection Blueprint - Implementation Guide</div>
    </div>
  </div>
  <div class="header-right">
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
</div>

<div class="container">

  <!-- Overview cards -->
  <div class="overview">
    <div class="overview-card">
      <div class="overview-card-label">Total Steps</div>
      <div class="overview-card-value" id="totalSteps">0</div>
      <div class="overview-card-sub">across 6 phases</div>
    </div>
    <div class="overview-card">
      <div class="overview-card-label">Completed</div>
      <div class="overview-card-value" id="completedSteps" style="color:var(--green)">0</div>
      <div class="overview-card-sub" id="completedSub">0 remaining</div>
    </div>
    <div class="overview-card">
      <div class="overview-card-label">Current Phase</div>
      <div class="overview-card-value" id="currentPhase" style="font-size:18px;line-height:1.3">-</div>
    </div>
    <div class="overview-card">
      <div class="overview-card-label">Est. Time</div>
      <div class="overview-card-value" id="estTime">~4 hrs</div>
      <div class="overview-card-sub">end-to-end setup</div>
    </div>
  </div>

  <!-- Phases get injected here -->
  <div id="phasesContainer"></div>

</div>

<script>
const PHASES = [
  {
    title: "Typeform Quiz Setup",
    color: "#1E88E5",
    items: [
      {
        title: "Create quiz in Typeform",
        desc: "Create a new Typeform with the quiz questions and scoring logic.",
        tag: "typeform",
        detail: `<h4>Quiz Details</h4>
<p>Form ID (if already created): <code>aQfJd7JN</code></p>
<p>Create a Typeform with these 11 questions. Only Q2, Q3, Q5, Q7, Q9 are scored. The rest are for personalisation and sales context.</p>

<h4>Q1: Financial Goal (Multi-select, NOT scored)</h4>
<p>"What's your primary financial goal right now?"</p>
<ul>
<li>Protect and preserve the wealth I've already built</li>
<li>Grow my portfolio with less risk and more structure</li>
<li>Diversify beyond traditional assets (property, stocks, cash)</li>
<li>Build a portfolio that lasts across generations</li>
</ul>

<h4>Q2: Risk Tolerance (Single select, 15 pts max)</h4>
<p>"Where do you stand currently when it comes to your risk tolerance?"</p>
<table>
<tr><th>Answer</th><th>Points</th></tr>
<tr><td>I'm actively building wealth and want to accelerate</td><td>15</td></tr>
<tr><td>I'm focused on preserving and protecting what I've built</td><td>12</td></tr>
<tr><td>I'm working toward retirement and need my portfolio to last</td><td>10</td></tr>
<tr><td>I'm already retired and need my capital to outpace inflation</td><td>8</td></tr>
</table>

<h4>Q3: Investment Approach (Single select, 20 pts max)</h4>

<table>

<tr><td>Diversified across property, equities, and cash</td><td>15</td></tr>
<tr><td>Mostly property and retirement accounts</td><td>10</td></tr>
<tr><td>Heavily concentrated in one area</td><td>5</td></tr>
</table>

<h4>Q4: Reconsider Reason (Single select, NOT scored)</h4>
<p>"What's making you reconsider your current approach?"</p>
<ul>
<li>Traditional investments aren't delivering the returns they used to</li>
<li>I can see the financial system is shifting and I don't want to be left behind</li>

<li>I'm losing purchasing power faster than my portfolio is growing</li>

<p>"On a scale of 1-10, how confident are you that your current portfolio will meet your long-term goals?"</p>

<h4>Q6: 12-Month Concern (Single select, NOT scored)</h4>

<tr><td>Yes, but without a clear strategy</td><td>15</td></tr>
<tr><td>No, but I've been paying attention</td><td>10</td></tr>
<tr><td>I tried and it didn't go well</td><td>5</td></tr>
</table>

<h4>Q8: Best Case Scenario (Free text, NOT scored)</h4>
<p>"In your own words, what is your absolute best-case scenario..."</p>

<h4>Q9: Capital Capacity (Single select, 10 pts max)</h4>
<p>"If you had 100% conviction, how much capital could you allocate?"</p>
<table>
<tr><th>Answer</th><th>Points</th></tr>
<tr><td>More than $250K</td><td>10</td></tr>
<tr><td>$100K - $250K</td><td>8</td></tr>
<tr><td>$50K - $100K</td><td>6</td></tr>
<tr><td>Under $50K</td><td>4</td></tr>
</table>

<h4>Q10: Contact Info</h4>
<p>Phone number + email (use Typeform's contact info field type)</p>

<h4>Q11: Name</h4>
<p>First name + last name</p>

<h4>Score Categories</h4>
<table>
<tr><th>Score</th><th>Category</th><th>Colour</th></tr>
<tr><td>0-30</td><td>At Risk</td><td style="color:#E53935">Red (#E53935)</td></tr>
<tr><td>31-50</td><td>Vulnerable</td><td style="color:#FB8C00">Orange (#FB8C00)</td></tr>
<tr><td>51-70</td><td>Building</td><td style="color:#1E88E5">Blue (#1E88E5)</td></tr>
<tr><td>71-100</td><td>Well Positioned</td><td style="color:#43A047">Green (#43A047)</td></tr>
</table>

<p><strong>Total possible score: 100 points</strong> (Q2: 15 + Q3: 20 + Q5: 30 + Q7: 25 + Q9: 10)</p>`
      },
      {
        title: "Configure Typeform scoring (Calculator feature)",
        desc: "Set up the built-in Typeform Calculator to auto-score responses. If your plan supports it, use score variables. Otherwise, the Node.js backend handles scoring.",
        tag: "typeform",
        detail: `<h4>Option A: Typeform Calculator (if on Business/Enterprise plan)</h4>
<p>Use Typeform's Calculator feature to assign point values to each scored answer. Create a variable called <code>score</code> and add the point values from the scoring table above.</p>
<p>For Q5 (opinion scale), you'll need to manually map each scale step to a point value since Typeform can't multiply. Map: 0=0, 1=3, 2=6, 3=9, 4=12, 5=15, 6=18, 7=21, 8=24, 9=27, 10=30.</p>

<h4>Option B: Let the backend handle scoring (recommended)</h4>
<p>Skip the Typeform Calculator. The Node.js webhook service calculates the score server-side from raw answers. This is more reliable and easier to adjust later.</p>
<p>Either way works. Option B is simpler to set up.</p>`
      },
      {
        title: "Configure Typeform webhook",
        desc: "Set up the webhook to fire on form submission, pointing at your Node.js service.",
        tag: "typeform",
        detail: `<h4>Steps</h4>
<ol>
<li>Go to Typeform > Connect > Webhooks</li>
<li>Add webhook URL: <code>https://YOUR-APP.onrender.com/webhook/typeform</code></li>
<li>Copy the webhook signing secret (if available) and save it as <code>TYPEFORM_WEBHOOK_SECRET</code> in your Render env vars</li>
<li>Test with a submission to confirm the webhook fires</li>
</ol>
<p>The webhook endpoint returns 200 OK immediately and processes in the background.</p>`
      },
      {
        title: "Set Typeform completion redirect",
        desc: "Configure where users go after completing the quiz.",
        tag: "typeform",
        detail: `<h4>Option A: Redirect to Node.js results page</h4>
<p>In Typeform > Settings > Thank You Screen, set redirect URL to:</p>
<pre>https://YOUR-APP.onrender.com/results?token={{hidden:submission_token}}</pre>
<p>The backend stores results keyed by submission token, so the results page can fetch them.</p>

<h4>Option B: Redirect to GHL confirmation pages</h4>
<p>If using GHL pages instead of the Node.js results page, configure 4 different redirect URLs using Typeform's Logic feature based on the calculated score variable.</p>

<li>Score 31-50: <code>https://YOUR-GHL-DOMAIN.com/wpb-results-vulnerable?name={{field:first_name}}&score={{var:score}}</code></li>

<li>Score 71-100: <code>https://YOUR-GHL-DOMAIN.com/wpb-results-strong?name={{field:first_name}}&score={{var:score}}</code></li>
</ul>
<p>Note: Option B requires Typeform Calculator to be set up (Step 1.2 Option A).</p>`
      }
    ]
  },
  {
    title: "GHL Confirmation Pages",
    color: "#FB8C00",
    items: [
      {
        title: "Create 4 GHL landing pages",
        desc: "Create one page per score category in GoHighLevel page builder.",
        tag: "ghl",
        detail: `<h4>Pages to Create</h4>

<tr><td>At Risk</td><td>/wpb-results-at-risk</td><td>0-30</td><td>Red (#E53935)</td></tr>
<tr><td>Vulnerable</td><td>/wpb-results-vulnerable</td><td>31-50</td><td>Orange (#FB8C00)</td></tr>
<tr><td>Building</td><td>/wpb-results-building</td><td>51-70</td><td>Blue (#1E88E5)</td></tr>
<tr><td>Well Positioned</td><td>/wpb-results-strong</td><td>71-100</td><td>Green (#43A047)</td></tr>
</table>

<h4>Instructions</h4>
<ol>
<li>In GHL, go to Sites > Funnels (or Websites)</li>
<li>Create a new funnel/page for each category</li>
<li>Set the URL slug as shown above</li>
<li>Add a "Custom Code" or "Custom HTML" element</li>
<li>Paste the embed code (next step) into it</li>
<li>Set page background to white</li>
<li>Remove any default header/footer elements</li>

      },
      {
        title: "Paste embed code into each page",
        desc: "Add the custom HTML/CSS/JS embed code that displays the personalised score, category messaging, PDF download, and call booking CTA.",
        tag: "ghl",
        detail: `<h4>How to Use the Embed Code</h4>
<ol>

  <ul>

      },
      {
        title: "Upload PDF to GHL Media Library",
        desc: "Upload the Wealth Protection Blueprint PDF and get the hosted URL for the download button.",
        tag: "ghl",
        detail: `<h4>Steps</h4>
<ol>

<li>Upload the Wealth Protection Blueprint PDF (19-page document)</li>
<li>Copy the hosted URL</li>

</ol>
<p><strong>Note:</strong> The PDF needs to be created separately. It should be the 8-step system document covering: (1) Why Digital Assets Matter, (2) Bitcoin First Principles, (3) Altcoin Evaluation, (4) Risk Frameworks, (5) Buying Strategy, (6) Send and Store, (7) Tax Compliance, (8) Sell Strategy.</p>`
      },
      {
        title: "Configure strategy call booking link",
        desc: "Set the booking URL (Calendly or GHL calendar) in each embed code.",
        tag: "ghl",
        detail: `<h4>Options</h4>
<ul>
<li><strong>Calendly:</strong> Use your existing Calendly link (e.g., <code>https://calendly.com/collectiveshift/strategy-call</code>)</li>

// State
let checkState = {};
try {
  checkState = JSON.parse(localStorage.getItem('wpb-checklist') || '{}');
} catch(e) { checkState = {}; }

function saveState() {
  localStorage.setItem('wpb-checklist', JSON.stringify(checkState));
  updateProgress();
}

function getItemId(pi, ii) { return `p${pi}-i${ii}`; }

function updateProgress() {
  let total = 0, done = 0;
  PHASES.forEach((p, pi) => {
    p.items.forEach((_, ii) => {
      total++;
      if (checkState[getItemId(pi, ii)]) done++;
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
  document.getElementById('totalSteps').textContent = total;
  document.getElementById('completedSteps').textContent = done;
  document.getElementById('completedSub').textContent = (total - done) + ' remaining';

  // Current phase
  let currentPhase = 'All done!';
  for (let pi = 0; pi < PHASES.length; pi++) {
    const allDone = PHASES[pi].items.every((_, ii) => checkState[getItemId(pi, ii)]);
    if (!allDone) {
      currentPhase = PHASES[pi].title;
      break;
    }
  }
  document.getElementById('currentPhase').textContent = currentPhase;
}

function renderPhases() {
  const container = document.getElementById('phasesContainer');
  container.innerHTML = '';

  PHASES.forEach((phase, pi) => {
    const phaseDiv = document.createElement('div');
    phaseDiv.className = 'phase';

    const doneCount = phase.items.filter((_, ii) => checkState[getItemId(pi, ii)]).length;
    const allDone = doneCount === phase.items.length;

    phaseDiv.innerHTML = `
      <div class="phase-header" data-phase="${pi}">
        <div class="phase-number" style="background:${phase.color}">${pi + 1}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-meta">${doneCount}/${phase.items.length} complete</div>
        <div class="phase-toggle" id="toggle-${pi}">▼</div>
      </div>
      <div class="phase-body" id="body-${pi}">
        ${phase.items.map((item, ii) => {
          const id = getItemId(pi, ii);
          const isDone = checkState[id];
          const tagClass = item.tag === 'typeform' ? 'tag-typeform' : item.tag === 'ghl' ? 'tag-ghl' : item.tag === 'customerio' ? 'tag-customerio' : item.tag === 'code' ? 'tag-code' : 'tag-pdf';
          const tagLabel = item.tag.toUpperCase();
          return `
            <div class="check-item ${isDone ? 'done' : ''}" id="item-${id}">
              <div class="check-box ${isDone ? 'checked' : ''}" data-id="${id}"></div>
              <div class="check-content">
                <div class="check-title">${item.title}<span class="tag ${tagClass}">${tagLabel}</span></div>
                <div class="check-desc">${item.desc}</div>
                ${item.detail ? `<div class="check-expand-btn" data-detail="${id}">Show details</div><div class="check-detail" id="detail-${id}">${item.detail}</div>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    container.appendChild(phaseDiv);
  });

  // Event listeners
  document.querySelectorAll('.phase-header').forEach(h => {
    h.addEventListener('click', () => {
      const pi = h.dataset.phase;
      const body = document.getElementById('body-' + pi);
      const toggle = document.getElementById('toggle-' + pi);
      body.classList.toggle('collapsed');
      toggle.classList.toggle('collapsed');
    });
  });

  document.querySelectorAll('.check-box').forEach(box => {
    box.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = box.dataset.id;
      checkState[id] = !checkState[id];
      saveState();
      renderPhases();
    });
  });

  document.querySelectorAll('.check-expand-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.detail;
      const detail = document.getElementById('detail-' + id);
      const isVisible = detail.classList.contains('visible');
      detail.classList.toggle('visible');
      btn.textContent = isVisible ? 'Show details' : 'Hide details';
    });
  });

  updateProgress();
}

renderPhases();
</script>
