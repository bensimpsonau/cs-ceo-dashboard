const TESTIMONIALS = {

const GAP_COPY = {

function scoreCharToNum(char) {
  if (!char) return 1;
  return {A:1,B:2,C:3,D:4}[char] || 1;
}

function getQuizData() {
  // Try localStorage, then fallback to query params
  try {
    const a = JSON.parse(localStorage.getItem('cs_quiz_answers')||"null");
    if(a){
      let out = {
        name: localStorage.getItem('cs_quiz_name')||'Investor',
        score: parseInt(localStorage.getItem('cs_score')||'0',10),
        answers: a
      };
      AREAS.forEach((q,idx)=>{ out[q.k]=scoreCharToNum(a[idx+4]) }); // q4-q9
      // Also get q1,q2,q3
      out.q1 = localStorage.getItem('cs_q1_exp')||a[1];
      out.q2 = localStorage.getItem('cs_q2_goal')||a[2];
      out.q3 = localStorage.getItem('cs_q3_capital')||a[3];
      return out;
    }
  }catch(e){}
  // fallback to query params
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Investor';
  const score = parseInt(params.get('score')||'0',10);
  // Without localstorage, try to spread the score evenly
  let per = (score && score>=6 && score<=24) ? Math.round(score/6) : 2;
  return {
    name,
    score,
    q4:per, q5:per, q6:per, q7:per, q8:per, q9:per,
    answers: {},
    q1:'A',q2:'A',q3:'A' // Default fallback
  };
}
function assignArchetype(data) {
  for(const arch of ARCHETYPES){
    if(arch.logic(data,data.score)) return arch;
  }
  // fallback
  return ARCHETYPES[0];
}
function getRadarScores(data){
  return [data.q4, data.q5, data.q6, data.q7, data.q8];
} 
function radarColor(scoreIdx) { return SCORE_COLORS[scoreIdx-1]||SCORE_COLORS[0]; }
function getGaps(data) {
  // Sort by value (lowest 3), tie-breaker: lower index earlier
  let arr = [
    {i:0, k:"q4", val:data.q4},
    {i:1, k:"q5", val:data.q5},
    {i:2, k:"q6", val:data.q6},
    {i:3, k:"q7", val:data.q7},
    {i:4, k:"q8", val:data.q8},
    {i:5, k:"q9", val:data.q9}
  ];
  arr.sort((a, b) => a.val - b.val || a.i - b.i);
  return arr.slice(0,3);
}
function gapCopy(k, val) {
  if(val<=2 && GAP_COPY[k] && GAP_COPY[k][val-1]) return GAP_COPY[k][val-1];
  if(val===3) return "You're close, but a little structure will make a big difference here.";
  if(val>=4) return "No gaps detected here.";
  return "";
}
function buildRadar(scores) {
  // 5 axes, pentagon, center is (250,200), radius=120
  const center = {x:250,y:200}, r=120, axes = 5;
  // Convert each to polar,
  let points=[], dots=[], labels=[];
  for(let i=0;i<axes;i++){
    const angle = (Math.PI/2) + (i * 2*Math.PI/axes);
    const scoreRatio = ((scores[i]-1)/3);
    const px = center.x + Math.cos(angle)*r*scoreRatio;
    const py = center.y - Math.sin(angle)*r*scoreRatio;
    points.push([px,py]);
    // Outer dot for color
    dots.push({cx:center.x + Math.cos(angle)*r, cy:center.y - Math.sin(angle)*r, color:radarColor(scores[i]) });
    // Label
    let lx=center.x + Math.cos(angle)*(r+34);
    let ly=center.y - Math.sin(angle)*(r+37)+(i==2||i==3?16:0);
    let anchor = i===0?"middle":i<3?"start":"end";
    labels.push({x:lx, y:ly,text:AREAS[i].label, anchor });
  }
  // Grid rings for 4 levels
  let grids=[];
  for(let lvl=1;lvl<=4;lvl++){
    let ring=[];
    let radius = r*((lvl-1)/3);
    for(let i=0;i<axes;i++){
      const angle = (Math.PI/2) + (i * 2*Math.PI/axes);
      ring.push((center.x + Math.cos(angle)*radius)+","+(center.y - Math.sin(angle)*radius));
    }
    grids.push(ring.join(" "));
  }
  return { points, dots, labels, grids, center, r };
}

function testimonialsFor(archKey) {
  return TESTIMONIALS[archKey]||[];
}
function archetypeShortKey(k) {
  // Hack for testimonial fallback: key is eg. "sidelined_professional"
  return k.replace(/_/g,'-');
}

      <polygon points="${radar.points.map(([x,y])=>`${x},${y}`).join(' ')}" fill="${SCORE_COLORS[data.q4-1]||'#FFB020'}40" stroke="var(--orange)" stroke-width="2.9"></polygon>
      ${radar.dots.map((d,i)=>`<circle cx="${d.cx}" cy="${d.cy}" r="13" fill="${d.color}" class="traffic-dot"/>`).join('')}
      ${radar.labels.map(l=>`<text x="${l.x}" y="${l.y}" class="radar-label" text-anchor="${l.anchor}">${l.text}</text>`).join('')}
    </svg>
    <div class="radar-legend">
      <span><span class="legend-dot" style="background:#FF4444"></span>Red</span>
      <span><span class="legend-dot" style="background:#FFB020"></span>Amber</span>
      <span><span class="legend-dot" style="background:#A8D840"></span>Yellow-Green</span>
      <span><span class="legend-dot" style="background:#22C55E"></span>Green</span>
    </div></div>`;

    // Gaps: Weakest areas
    let weak = gaps.filter(g=>g.val<=2);
    if(weak.length){
      html += `<div style="margin-top:30px; margin-bottom:4px; color:#FFA040; font-weight:600;">Your weakest area${weak.length>1?'s':''}: ${weak.map(g=>AREAS[g.i].label).join(' & ')}</div>`;
      html += `<div style="color:#a5ffe0;">${weak.map(g=>gapCopy(g.k,g.val)).join(' ')}</div>`;
    } else {
      html += `<div style="margin:26px 0 2px; color:#A8D840; font-weight:600;">No red or amber zones detected. Good foundation—next level strategies will compound your results.</div>`;
    }
    html += `</div>`;

  // Section: Archetype
  html += `<div class="section archetype-sec"><h2>Archetype Assignment</h2><div style="font-size:1.25em;margin-bottom:7px;"><span class="archetype-emoji">${arch.emoji}</span><strong>${arch.label}</strong></div>`;

  html += `<div style="margin:9px 0 6px; font-size:1.07em; color:#CCCCCC;">${arch.people}</div>`;
  html += `<div style="margin:12px 0 2px; color:#FC5C03;font-weight:600;">Your biggest risks:</div><ul>`+
    arch.risks.map(r=>`<li>${r}</li>`).join('')+`</ul>`;
  html += `<div style="margin:7px 0 0 0;color:#08C394;font-weight:600;">The Blueprint steps that matter most for you:</div><ul>`+
    arch.focus.map(f=>`<li>${f}</li>`).join('')+`</ul>`;
  html += `</div>`;

  // Section: Gap Analysis
  html += `<div class="section gap-sec"><h2>Your 3 Biggest Gaps</h2><ul class="gap-list">`;
  gaps.forEach(g=>{
    html += `<li class="gap-item"><strong>You scored ${g.val}/4 on ${AREAS[g.i].label}</strong><br><span style="color:#FC5C03">${gapCopy(g.k,g.val)}</span><br><span style="color:#A8D840;">Blueprint focus: ${arch.focus[g.i%arch.focus.length]||'See main steps above'}.</span></li>`;
  });
  html += `</ul></div>`;

  // Section: Testimonials
  html += `<div class="section"><h2>Real Member Case Studies</h2><div class="testimonial-cards">`;
  testimonials.slice(0,3).forEach(t=>{
    html += `<div class="t-card"><div style="font-weight:700;">${t.name}</div><div>${t.headline}</div><div class="t-card-quote">“${t.quote}”</div><div style="font-size:0.95em;color:#a8d840;">Member for ${t.years} year${t.years>1?'s':''}</div></div>`;
  });
  html += `</div></div>`;

  // CTA
  html += `<div class="cta-wrap section no-print"><div style="font-size:1.15em;">${arch.cta}</div><a href="https://collectiveshift.io/strategy-call" class="cta-btn" target="_blank">Book Your Free Strategy Call</a>`;
  // Download blueprint
  html += `<div style="margin-top:19px;font-size:1em;">In the meantime, download the full 8-Step Digital Asset Wealth Blueprint:</div><a href="/blueprint-guide.html?score=${data.score}&name=${encodeURIComponent(data.name)}" class="cta-btn download-btn">Download Your Free Blueprint</a>`;
  // Print
  html += `<button class="cta-btn print-btn" onclick="window.print()">Print / Save PDF</button>`;
  html += `</div>`;

  document.getElementById('result-content').innerHTML = html;
}
setTimeout(()=>{
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result-content').style.display = '';
  render();
  window.scrollTo(0,0);
}, 2800);
</script>
</body>
</html>
