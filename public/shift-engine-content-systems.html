### Thumbnail Prompt Formulas (5)
1. **The Authority Frame:** Ben in navy blazer, confident expression, bold text overlay with key number (e.g., "534%"), orange accent bar at bottom. Dark background (#1B1925). Clean, professional, Bloomberg feel.
2. **The Question Hook:** Split frame. Left side: confused/worried face. Right side: clean chart going up. Bold question text in white. Orange highlight on one word.
3. **The Mistake Warning:** Red/amber colour accent. Ben with hand up "stop" gesture. Text: "Don't Do This" or "The \$X Mistake." Urgency without hype.
4. **The Framework Reveal:** Whiteboard/screen share preview. Clean diagram visible. Text suggests "The [X] Framework." Educational, structured feel.
5. **The Personal Story:** Ben casual (no blazer), authentic setting. Text hints at personal revelation. Warm tones. Approachable, not corporate.

# System 3: Sales Call Script Library

## 30-Minute Call Structure

### Overview
Every strategy call follows the same 4-phase structure regardless of who's running it. The voice and style change per person, but the framework stays consistent.

| Phase | Duration | Purpose |
|-------|----------|---------|
| 1. Open | 3-5 min | Build rapport, set expectations, confirm situation |
| 2. Diagnose | 8-12 min | Understand their situation, pain, goals, fears |
| 3. Present | 8-12 min | Present Platinum as the solution to their specific problems |
| 4. Close | 5-8 min | Handle objections, ask for the decision, process payment |

## Full Objection Handler

### Objection 1: "The price is too high" / "\$20,000 is a lot"

**Acknowledge:** "I completely understand. \$20,000 is a significant investment. I'd be concerned if you didn't take it seriously."

**Reframe:** "Let me ask you this. Over the last 12 months, what do you think not having a strategy has cost you? Missed opportunities, bad timing, the stress of going it alone. For most of our members, one decision in the first 90 days covers the entire investment."

**Proof:** "Our audited return is 534% over 3 years. Even if your portfolio is \$100K, that's the difference between growing to \$634K or staying where you are. The \$20K becomes a rounding error."

**Structure:** "And remember, if you're paying through a business or SMSF, it's tax-deductible. That brings the effective cost down significantly."

**Close:** "The real question isn't whether \$20K is a lot. It's what it costs you NOT to have this for another 12 months."

**Role-play example:**
Prospect: "Look, \$20,000 is a lot of money. I'm not sure I can justify that."
Rep: "I hear you. And honestly, if \$20,000 didn't make you pause, I'd be worried. It means you take your money seriously. Can I ask you something? In the last 12 months, have you made any decisions with your digital assets that, looking back, you wish you'd handled differently?"
Prospect: "Yeah, probably. I held on to some things too long."
Rep: "What do you think that cost you?"
Prospect: "I don't know, maybe \$30-40K?"
Rep: "So the question becomes: would having professional guidance and a clear exit strategy have been worth \$20K to save that \$30-40K? That's the maths most of our members do when they join."

### Objection 2: "I don't have the time"

**Acknowledge:** "That's actually the number one concern from our prospects. 38% cite time as their biggest worry. And I get it. You're busy. That's exactly why you need this."

**Reframe:** "Platinum isn't designed for people with spare time. It's designed for time-poor professionals who need a system that works without them watching charts all day. We've made 25 trades in 3 years. That's not daily management. That's strategic, structured decision-making."

**Specifics:** "The 5-week crash course is about 2-3 hours per week. After that, it's a biweekly livestream, occasional WhatsApp check-ins, and 8 coaching calls spread across the year. We're talking about 2-3 hours per month, not per day."

**Close:** "The irony is that the less time you have, the more you need a structured system. Otherwise you're making rushed decisions with real money. Does that make sense?"

**Role-play example:**
Prospect: "I'm running a business. I don't have time to learn this stuff."
Rep: "Totally get it. Can I ask how much time you spend currently thinking about or worrying about your digital assets?"
Prospect: "I check the prices most days. Maybe read some stuff on weekends."
Rep: "So you're already spending time. It's just unstructured time that's not getting you anywhere. What if you could spend the same amount of time, but with a clear framework, and actually make progress? That's what Platinum does. 2-3 hours a month after onboarding. Less time than you're spending now. But productive time."

### Objection 3: "Is this really for me? / I'm not sure I'm the right fit"

**Acknowledge:** "That's a fair question. Platinum isn't for everyone, and we're selective about who we work with."

**Qualify:** "Let me check. You've got [their portfolio size]. Your net worth is in the range of \$500K to \$2M+. You're motivated by [their stated goal]. And you're willing to invest in professional education. That's exactly our member profile."

**Social proof:** "67% of our members are 40-59. Business owners, executives, property investors. People who've built real wealth the traditional way and want to navigate digital assets with the same level of seriousness. Does that sound like people you'd want to learn alongside?"

**Close:** "The better question might be: can you afford NOT to have this? You've got significant assets in digital assets already, and the biggest risk is going another year without a framework."

### Objection 4: "I can do this myself"

**Acknowledge:** "You absolutely can. And some people do. The question is: how long will it take, what will the mistakes cost, and will you actually do it consistently?"

**Data:** "Here's what our data shows. 24% of our members had been in digital assets for 4+ years before joining. They could research. They could trade. But they didn't have a systematic framework, a community of peers, or an exit strategy. Time in the space doesn't equal confidence. Structure does."

**Proof:** "Our audited return is 534% over 3 years. How confident are you that your self-directed approach will match that? Not because you're not smart enough. But because doing this alone means making every decision in isolation, without institutional-grade research, and without the accountability of a structured framework."

**Close:** "The members who get the most value are exactly like you. Smart, capable people who realised that having a structured system and a team behind them wasn't a sign of weakness. It was the smartest investment decision they made."

### Objection 5: "I need to talk to my partner"

**Acknowledge:** "Of course. That makes complete sense. Big financial decisions should involve your partner."

**Equip:** "Let me help you have that conversation. The three things that usually matter to a partner: One, it's tax-deductible through a business or SMSF. Two, it's education, not a speculative investment. Three, 74% of members renew, which means the value delivers. Would it help if I sent you our audited returns PDF and a quick video from Travis that explains the approach? That way you've got something concrete to share."

**Pin down:** "When do you think you'll have that conversation? I'd love to book a quick 10-minute follow-up for [day after] so we can answer any questions that come up."

**Close:** Don't let them leave without a follow-up booked AND the payment link sent.

### Objection 6: "The market is down / Is now a bad time?"

**Acknowledge:** "I understand the instinct. When markets are down, everything feels uncertain."

**Reframe:** "Here's the thing. When was the last time you heard someone say 'I wish I didn't learn about investing during a downturn'? Down markets are when the best education happens. Our members who joined during the 2022 bear market had the best outcomes because they built their knowledge, framework, and positions when prices were low."

**Data:** "Our audited returns include a -16% year in 2022 and a -12% year in 2020. Despite those, the 3-year number is 534%. Down markets are part of the strategy, not a reason to avoid having one."

**Close:** "The worst time to build a strategy is when the market is euphoric and everyone's making money. The best time is when you can learn clearly, position carefully, and be ready for the next move."

### Objection 7: "I'll think about it" / "Let me sleep on it"

**Acknowledge:** "Absolutely. This is a meaningful decision and I want you to feel good about it."

**Bridge:** "Can I ask what specifically you want to think about? Is it the investment, the fit, or something else? I'd rather address it now than have you thinking about an unanswered question."

[If they give a specific objection, handle it. If they genuinely need time:]

**Send proof:** "Let me send you a few things while you're thinking. Our audited returns PDF. A video from Travis on the investor psychology framework. And the payment link so it's ready when you decide. What's the best way to send those, email or WhatsApp?"

**Book follow-up:** "And let's book a quick 10-minute check-in for [tomorrow/day after]. Not to pressure you. Just to answer any new questions that come up. Does [time] work?"

**Close:** Never end a call without: (1) payment link sent, (2) follow-up booked, (3) proof materials sent.

const links = document.querySelectorAll('.sidebar-link[href^="#"]');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) {
      links.forEach(l => l.classList.remove('active'));
      const link = document.querySelector(`.sidebar-link[href="#${e.target.id}"]`);
      if(link) link.classList.add('active');
    }
  });

document.querySelectorAll('[id]').forEach(el => observer.observe(el));
