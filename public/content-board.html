<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Distribution Board — CS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FC5C03;--navy:#1A1A2E;--navy-light:#16213E;--navy-mid:#0F3460;
  --card-bg:#1e2a42;--card-hover:#253553;--col-bg:#131a2e;--text:#e8e8e8;
  --text-muted:#8892a4;--border:#2a3550;--shadow:0 2px 8px rgba(0,0,0,.35);
  --yt-red:#FF0000;--yt-shorts:#FF4444;--tiktok:#EE1D52;--ig-purple:#C13584;
  --li-blue:#0A66C2;--x-black:#ffffff;--news-orange:#FC5C03;--pod-green:#1DB954;
}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--navy);color:var(--text);font-size:14px}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-bottom:2px solid var(--orange);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--orange)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{background:var(--orange);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem;transition:all .15s}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-secondary{background:var(--navy-mid);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--card-hover)}
.btn-sm{padding:5px 10px;font-size:.75rem}

/* ── Filters ── */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .15s;user-select:none}
.filter-chip:hover,.filter-chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* ── Video Info Bar ── */
.video-bar{background:var(--navy-light);padding:10px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);font-size:.82rem;flex-wrap:wrap}
.video-bar .label{color:var(--text-muted)}
.video-bar a{color:var(--orange);text-decoration:none}
.video-bar a:hover{text-decoration:underline}
.progress-summary{margin-left:auto;display:flex;gap:14px;align-items:center}
.progress-summary .ps-item{color:var(--text-muted)}
.progress-summary .ps-item strong{color:var(--text)}

/* ── Board ── */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px}
.board{display:flex;gap:14px;min-height:calc(100vh - 140px);align-items:flex-start}
.column{background:var(--col-bg);border-radius:10px;min-width:230px;width:230px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 150px);border:1px solid var(--border)}
.col-header{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--col-bg);border-radius:10px 10px 0 0;z-index:2}
.col-title{font-weight:700;font-size:.85rem}
.col-count{background:var(--navy-mid);color:var(--text-muted);font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.col-cards{padding:6px 10px 14px;flex:1;overflow-y:auto;min-height:60px}
.col-cards::-webkit-scrollbar{width:4px}
.col-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Cards ── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:grab;transition:all .15s;position:relative}
.card:hover{background:var(--card-hover);border-color:var(--orange);transform:translateY(-1px);box-shadow:var(--shadow)}
.card.dragging{opacity:.4;transform:rotate(2deg)}
.card-number{font-size:.65rem;color:var(--text-muted);margin-bottom:4px;font-weight:600}
.card-title{font-size:.8rem;font-weight:600;line-height:1.35;margin-bottom:8px}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap}
.badge-yt{background:#FF0000}
.badge-yts{background:#FF4444}
.badge-tt{background:linear-gradient(135deg,#EE1D52,#000)}
.badge-ig{background:linear-gradient(135deg,#833AB4,#FD1D1D,#F77737)}
.badge-li{background:#0A66C2}
.badge-x{background:#333;border:1px solid #555}
.badge-news{background:var(--orange)}
.badge-pod{background:#1DB954}
.stage-tag{font-size:.63rem;color:var(--text-muted);background:var(--navy);padding:2px 6px;border-radius:3px}
.card-actions{display:flex;gap:4px;margin-top:8px}
.card-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:3px 7px;border-radius:4px;cursor:pointer;font-size:.65rem;transition:all .12s}
.card-btn:hover{border-color:var(--orange);color:var(--orange)}
.card-btn.done-btn:hover{border-color:#1DB954;color:#1DB954}

/* drop indicator */
.drop-indicator{height:4px;background:var(--orange);border-radius:2px;margin:4px 0;transition:all .15s}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--navy-light);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-head{padding:18px 22px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h2{font-size:1.05rem;font-weight:700;line-height:1.3}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--orange)}
.modal-body{padding:18px 22px}
.modal-body .field{margin-bottom:14px}
.modal-body .field label{display:block;font-size:.75rem;color:var(--text-muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.modal-body .field p,.modal-body .field div{font-size:.88rem;line-height:1.5}
.modal-body .brief-section{background:var(--navy);padding:12px 14px;border-radius:8px;border:1px solid var(--border);margin-top:8px}
.modal-body .brief-section h4{color:var(--orange);font-size:.78rem;margin-bottom:6px}
.modal-body .brief-section p{font-size:.82rem;color:var(--text-muted);line-height:1.55}
.modal-body input,.modal-body textarea,.modal-body select{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:.85rem}
.modal-body textarea{min-height:80px;resize:vertical}
.modal-foot{padding:12px 22px 18px;display:flex;gap:8px;justify-content:flex-end}
.move-select{display:flex;gap:6px;align-items:center;margin-top:10px}
.move-select label{font-size:.75rem;color:var(--text-muted);font-weight:600}
.move-select select{width:auto;padding:5px 8px}

/* ── Responsive ── */
@media(max-width:768px){
  .header{padding:10px 14px}
  .header h1{font-size:1.1rem}
  .board-wrap{padding:10px}
  .column{min-width:200px;width:200px}
  .video-bar{padding:8px 14px;font-size:.78rem}
  .progress-summary{margin-left:0;width:100%}
}
@media(max-width:480px){
  .column{min-width:85vw;width:85vw}
  .filters{gap:4px}
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 <span>Content</span> Distribution Board</h1>
  <div class="header-right">
    <div class="filters">
      <span class="filter-chip active" data-filter="all">All</span>
      <span class="filter-chip" data-filter="YouTube">YouTube</span>
      <span class="filter-chip" data-filter="YouTube Shorts">Shorts</span>
      <span class="filter-chip" data-filter="Instagram">Instagram</span>
      <span class="filter-chip" data-filter="TikTok">TikTok</span>
      <span class="filter-chip" data-filter="LinkedIn">LinkedIn</span>
      <span class="filter-chip" data-filter="X/Twitter">X</span>
      <span class="filter-chip" data-filter="Newsletter">Newsletter</span>
      <span class="filter-chip" data-filter="Podcast">Podcast</span>
    </div>
    <button class="btn" id="addVideoBtn">+ New Video</button>
  </div>
</div>

<div class="video-bar">
  <span class="label">Current Video:</span>
  <strong>Bitcoin Is Down 48%. Is Now the Time to Buy? (Data Only)</strong>
  <a href="https://youtu.be/KZIjRzlLEvI" target="_blank">▶ Watch</a>
  <div class="progress-summary" id="progressSummary"></div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn-secondary btn" onclick="closeModal()">Close</button>
      <button class="btn done-btn-modal btn" id="modalDoneBtn">✓ Mark Posted</button>
    </div>
  </div>
</div>

<!-- New Video Modal -->
<div class="modal-overlay" id="newVideoModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Add New Video</h2>
      <button class="modal-close" onclick="closeNewVideoModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Video Title</label><input type="text" id="nvTitle" placeholder="e.g. Why Bitcoin Will Hit $200K"></div>
      <div class="field"><label>YouTube URL</label><input type="text" id="nvUrl" placeholder="https://youtu.be/..."></div>
      <div class="field"><label>Starting Column</label>
        <select id="nvColumn">
          <option value="Raw Video">Raw Video</option>
          <option value="In Edit">In Edit</option>
          <option value="Redistribution" selected>Redistribution</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary btn" onclick="closeNewVideoModal()">Cancel</button>
      <button class="btn" onclick="createNewVideo()">Create 17 Cards</button>
    </div>
  </div>
</div>

<script>
// ── Data ──
const COLUMNS = ['Raw Video','In Edit','Redistribution','Formatting','Ben Review','Ready to Post','Posted'];

const PLATFORM_BADGES = {
  'YouTube':       { cls:'badge-yt',   label:'YouTube' },
  'YouTube Shorts':{ cls:'badge-yts',  label:'YT Shorts' },
  'TikTok':        { cls:'badge-tt',   label:'TikTok' },
  'TikTok/Reels':  { cls:'badge-tt',   label:'TikTok/Reels' },
  'Instagram':     { cls:'badge-ig',   label:'Instagram' },
  'Reels':         { cls:'badge-ig',   label:'Reels' },
  'LinkedIn':      { cls:'badge-li',   label:'LinkedIn' },
  'X/Twitter':     { cls:'badge-x',    label:'X/Twitter' },
  'Newsletter':    { cls:'badge-news', label:'Newsletter' },
  'Podcast':       { cls:'badge-pod',  label:'Podcast' },
};

const BRIEFS = {
  1: { hook:"Open with the 48% stat — viewers in the value zone.", angle:"Show the historical drawdown chart. Every major dip preceded a new ATH. This is data, not hopium.", cta:"Like if you're buying the dip." },
  2: { hook:"Bitcoin is down 48% from ATH — here's what that actually means.", angle:"Context the % drop vs previous cycles. 2018 was 84%. 2022 was 77%. 48% is mild.", cta:"Follow for data-driven crypto takes." },
  3: { hook:"I started buying at $63K and here's why I'm not worried.", angle:"DCA strategy — show the math of buying through volatility vs trying to time the bottom.", cta:"Save this for when you're panicking." },
  4: { hook:"Whatever you do, don't go all in right now.", angle:"Risk management. Position sizing. Why 5-10% portfolio allocation makes sense even if bullish.", cta:"Share with someone who needs to hear this." },
  5: { hook:"Bitcoin is NOT the same as altcoins — stop treating them the same.", angle:"BTC vs ALT drawdown comparison. BTC recovers, many alts don't. Flight to quality.", cta:"Comment your biggest alt L." },
  6: { hook:"BlackRock, Fidelity, and sovereign funds are all buying. Why?", angle:"Institutional accumulation data from on-chain analytics. Smart money is loading.", cta:"This is the signal retail ignores." },
  7: { hook:"Community poll + key stat from the video.", angle:"Quick engagement post: 'Bitcoin is down 48%. Are you: A) Buying more B) Holding C) Selling D) Waiting'. Include one compelling chart.", cta:"Vote and share your strategy." },
  8: { hook:"Slide 1: Bold stat headline. Slides 2-9: Data story. Slide 10: CTA.", angle:"Visual data storytelling — each slide one clear point with chart/graphic. Carousel format for saves.", cta:"Save this carousel. Share with a friend who's panicking." },
  9: { hook:"The Weekly Shift: What 48% Down Really Means For Your Portfolio", angle:"Long-form newsletter section. Historical context, DCA math, institutional signals, risk framework. This is the 'smart money' analysis for subscribers.", cta:"Forward this to someone sitting on the sidelines." },
  10:{ hook:"Thread: Bitcoin is down 48% from ATH. Here's what the data says (not opinions). 🧵", angle:"8-tweet thread. Each tweet = one data point. Charts where possible. Build the case methodically.", cta:"Repost if this helped you think clearly. Follow for weekly data threads." },
  11:{ hook:"Bitcoin is down 48%. Here's what I see when I look at the data.", angle:"Professional/analytical tone. Institutional framing. Connect to macro trends and portfolio theory. LinkedIn audience wants sophistication.", cta:"What's your read on the current drawdown? Drop your take below." },
  12:{ hook:"POV: You see Bitcoin is down 48% and everyone is panicking", angle:"Greenscreen over the video/chart. React in real-time. Casual, confident energy. 'Let me show you what this actually means.'", cta:"Follow for reactions to the biggest crypto moments." },
  13:{ hook:"Story 1: Question hook. Stories 2-4: Key data points. Story 5: CTA.", angle:"Vertical story format. Bold text overlays on dark backgrounds. Swipe-up to full video. Quick dopamine hits of data.", cta:"Swipe up to watch the full breakdown." },
  14:{ hook:"Bitcoin is down 48%. Everyone's panicking. Here's what I see... 👇", angle:"Instagram caption optimized. Emoji-rich, scannable. Pair with a chart or data graphic. Hashtag strategy included.", cta:"Save this post. You'll want it when we hit a new ATH. Link in bio for the full analysis." },
  15:{ hook:"What a 48% Bitcoin Drawdown Teaches Us About Market Psychology", angle:"Long-form LinkedIn article format. 800-1200 words. Academic/analytical tone. Reference market psychology, behavioral economics, institutional theory.", cta:"Follow me for weekly data-driven analysis of digital assets and market structure." },
  16:{ hook:"One chart that explains everything about Bitcoin's 48% drop.", angle:"Quote card — single powerful visual. Clean design with one stat and one insight. Made for reposting.", cta:"Repost this." },
  17:{ hook:"Clip from the video discussion — the most compelling 60-90 seconds.", angle:"Audio/video clip optimized for podcast promo. Tease the full analysis. Works as a standalone insight.", cta:"Full episode linked in bio. Subscribe so you never miss a weekly breakdown." },
};

let cardIdCounter = 100;
let cards = [];
let activeFilter = 'all';
let dragCard = null;

function generateId(){ return ++cardIdCounter; }

const TEMPLATE_CARDS = [
  { num:1,  title:'Short Clip 1 — The Value Zone',         platform:'YouTube Shorts', stage:'Stage 1' },
  { num:2,  title:'Short Clip 2 — 48% Reality Check',      platform:'YouTube Shorts', stage:'Stage 1' },
  { num:3,  title:'Short Clip 3 — Why I Started Buying at $63K', platform:'TikTok', stage:'Stage 1-2' },
  { num:4,  title:'Short Clip 4 — Don\'t Go All In',       platform:'Reels',          stage:'Stage 1' },
  { num:5,  title:'Short Clip 5 — Bitcoin ≠ Altcoins',     platform:'TikTok',         stage:'Stage 1' },
  { num:6,  title:'Short Clip 6 — The Institutional Signal',platform:'Reels',         stage:'Stage 1' },
  { num:7,  title:'YouTube Community Post',                  platform:'YouTube',        stage:'Stage 1' },
  { num:8,  title:'Instagram Carousel (10 slides)',          platform:'Instagram',      stage:'Stage 1-2' },
  { num:9,  title:'Newsletter — The Weekly Shift',           platform:'Newsletter',     stage:'Stage 2' },
  { num:10, title:'X/Twitter Thread (8 tweets)',             platform:'X/Twitter',      stage:'Stage 1' },
  { num:11, title:'LinkedIn Post',                           platform:'LinkedIn',       stage:'Stage 1-2' },
  { num:12, title:'Greenscreen Reaction Script',             platform:'TikTok/Reels',   stage:'Stage 1' },
  { num:13, title:'Instagram Story Sequence (5 stories)',    platform:'Instagram',      stage:'Stage 1' },
  { num:14, title:'Platform Variant — Instagram caption',    platform:'Instagram',      stage:'Stage 1' },
  { num:15, title:'Platform Variant — LinkedIn long-form',   platform:'LinkedIn',       stage:'Stage 2' },
  { num:16, title:'Platform Variant — X quote card',         platform:'X/Twitter',      stage:'Stage 1' },
  { num:17, title:'Podcast Clip/Promo',                      platform:'Podcast',        stage:'Stage 5' },
];

// Init pre-loaded cards
TEMPLATE_CARDS.forEach(t => {
  cards.push({
    id: generateId(),
    num: t.num,
    title: t.title,
    platform: t.platform,
    stage: t.stage,
    column: 'Redistribution',
    video: 'Bitcoin Is Down 48%. Is Now the Time to Buy? (Data Only)',
    url: 'https://youtu.be/KZIjRzlLEvI'
  });
});

// ── Render ──
function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  const summary = document.getElementById('progressSummary');

  COLUMNS.forEach(col => {
    const colCards = cards.filter(c => c.column === col && matchesFilter(c));
    const allColCards = cards.filter(c => c.column === col);

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.column = col;

    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col}</span>
        <span class="col-count">${allColCards.length}</span>
      </div>
      <div class="col-cards" data-column="${col}"></div>
    `;

    const cardsContainer = colEl.querySelector('.col-cards');
    setupDropZone(cardsContainer);

    colCards.forEach(card => {
      cardsContainer.appendChild(renderCard(card));
    });

    board.appendChild(colEl);
  });

  // Update progress summary
  const total = cards.length;
  const posted = cards.filter(c => c.column === 'Posted').length;
  const inProgress = total - posted;
  summary.innerHTML = `
    <span class="ps-item"><strong>${total}</strong> total</span>
    <span class="ps-item"><strong>${posted}</strong> posted</span>
    <span class="ps-item"><strong>${inProgress}</strong> in progress</span>
  `;
}

function matchesFilter(card){
  if(activeFilter === 'all') return true;
  return card.platform.includes(activeFilter);
}

function renderCard(card){
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;

  const badge = PLATFORM_BADGES[card.platform] || { cls:'badge-news', label:card.platform };
  const colIdx = COLUMNS.indexOf(card.column);

  el.innerHTML = `
    <div class="card-number">#${card.num} · ${card.video ? card.video.substring(0,35)+'…' : ''}</div>
    <div class="card-title">${card.title}</div>
    <div class="card-meta">
      <span class="badge ${badge.cls}">${badge.label}</span>
      <span class="stage-tag">${card.stage}</span>
    </div>
    <div class="card-actions">
      ${colIdx < COLUMNS.length - 1 ? `<button class="card-btn" onclick="moveCard(${card.id},'next')" title="Move right">→ Next</button>` : ''}
      ${colIdx > 0 ? `<button class="card-btn" onclick="moveCard(${card.id},'prev')" title="Move left">← Back</button>` : ''}
      ${card.column !== 'Posted' ? `<button class="card-btn done-btn" onclick="moveCard(${card.id},'done')" title="Mark posted">✓</button>` : ''}
    </div>
  `;

  // Click to open detail (not on buttons)
  el.addEventListener('click', e => {
    if(e.target.tagName === 'BUTTON') return;
    openCardModal(card.id);
  });

  // Drag events
  el.addEventListener('dragstart', e => {
    dragCard = card.id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragCard = null;
    document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
  });

  return el;
}

function setupDropZone(container){
  container.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // Show indicator
    const afterEl = getDragAfterElement(container, e.clientY);
    const existing = container.querySelector('.drop-indicator');
    if(!existing){
      const ind = document.createElement('div');
      ind.className = 'drop-indicator';
      if(afterEl) container.insertBefore(ind, afterEl);
      else container.appendChild(ind);
    }
  });
  container.addEventListener('dragleave', e => {
    if(!container.contains(e.relatedTarget)){
      container.querySelectorAll('.drop-indicator').forEach(d => d.remove());
    }
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    container.querySelectorAll('.drop-indicator').forEach(d => d.remove());
    if(dragCard === null) return;
    const targetCol = container.dataset.column;
    const card = cards.find(c => c.id === dragCard);
    if(card){
      card.column = targetCol;
      save();
      render();
    }
  });
}

function getDragAfterElement(container, y){
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// ── Actions ──
function moveCard(id, direction){
  const card = cards.find(c => c.id === id);
  if(!card) return;
  const idx = COLUMNS.indexOf(card.column);
  if(direction === 'next' && idx < COLUMNS.length - 1) card.column = COLUMNS[idx + 1];
  else if(direction === 'prev' && idx > 0) card.column = COLUMNS[idx - 1];
  else if(direction === 'done') card.column = 'Posted';
  save(); render();
}

// ── Card Modal ──
function openCardModal(id){
  const card = cards.find(c => c.id === id);
  if(!card) return;
  const modal = document.getElementById('cardModal');
  const badge = PLATFORM_BADGES[card.platform] || { cls:'badge-news', label:card.platform };
  const brief = BRIEFS[card.num] || { hook:'—', angle:'—', cta:'—' };

  document.getElementById('modalTitle').innerHTML = `#${card.num} ${card.title}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="field">
      <label>Platform</label>
      <div><span class="badge ${badge.cls}">${badge.label}</span> <span class="stage-tag">${card.stage}</span></div>
    </div>
    <div class="field">
      <label>Source Video</label>
      <p>${card.video || '—'} ${card.url ? `<a href="${card.url}" target="_blank" style="color:var(--orange)">[Watch]</a>` : ''}</p>
    </div>
    <div class="field">
      <label>Current Column</label>
      <div class="move-select">
        <select id="modalMoveSelect" onchange="moveCardToColumn(${card.id}, this.value)">
          ${COLUMNS.map(c => `<option value="${c}" ${c===card.column?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="brief-section">
      <h4>🎯 Hook</h4>
      <p>${brief.hook}</p>
    </div>
    <div class="brief-section" style="margin-top:8px">
      <h4>📐 Angle / Brief</h4>
      <p>${brief.angle}</p>
    </div>
    <div class="brief-section" style="margin-top:8px">
      <h4>📢 CTA</h4>
      <p>${brief.cta}</p>
    </div>
  `;

  document.getElementById('modalDoneBtn').onclick = () => { moveCard(id, 'done'); closeModal(); };
  modal.classList.add('open');
}

function moveCardToColumn(id, col){
  const card = cards.find(c => c.id === id);
  if(card){ card.column = col; save(); render(); }
}

function closeModal(){ document.getElementById('cardModal').classList.remove('open'); }

// ── New Video Modal ──
document.getElementById('addVideoBtn').onclick = () => {
  document.getElementById('newVideoModal').classList.add('open');
};
function closeNewVideoModal(){ document.getElementById('newVideoModal').classList.remove('open'); }

function createNewVideo(){
  const title = document.getElementById('nvTitle').value.trim();
  const url = document.getElementById('nvUrl').value.trim();
  const col = document.getElementById('nvColumn').value;
  if(!title){ alert('Please enter a video title.'); return; }

  TEMPLATE_CARDS.forEach(t => {
    cards.push({
      id: generateId(),
      num: t.num,
      title: t.title.replace(/Bitcoin Is Down.*$/,'').trim() || t.title,
      platform: t.platform,
      stage: t.stage,
      column: col,
      video: title,
      url: url
    });
  });
  save(); render();
  closeNewVideoModal();
  document.getElementById('nvTitle').value = '';
  document.getElementById('nvUrl').value = '';
}

// ── Filters ──
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  });
});

// ── Persistence (localStorage) ──
function save(){
  try { localStorage.setItem('cs_content_board', JSON.stringify(cards)); } catch(e){}
}
function load(){
  try {
    const d = localStorage.getItem('cs_content_board');
    if(d){
      const parsed = JSON.parse(d);
      if(parsed && parsed.length){ cards = parsed; cardIdCounter = Math.max(...cards.map(c=>c.id)) + 1; }
    }
  } catch(e){}
}

// ── Close modals on overlay click ──
document.getElementById('cardModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeModal(); });
document.getElementById('newVideoModal').addEventListener('click', e => { if(e.target === e.currentTarget) closeNewVideoModal(); });

// ── Keyboard ──
document.addEventListener('keydown', e => { if(e.key === 'Escape'){ closeModal(); closeNewVideoModal(); }});

// ── Init ──
load();
render();
</script>
</body>
</html>
